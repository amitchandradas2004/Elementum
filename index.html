<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elementum</title>
    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google font 1 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap"
      rel="stylesheet"
    />
    <!-- Google font 2 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=GFS+Didot&display=swap"
      rel="stylesheet"
    />
    <!-- Daisy UI and Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      .garamond {
        font-family: "EB Garamond", serif;
        font-optical-sizing: auto;
        font-style: normal;
      }
      .didot {
        font-family: "GFS Didot", serif;
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="bg-gray-100 shadow-sm">
        <div
          class="flex justify-between items-center text-center content-center container mx-auto py-1 px-2 md:px-0"
        >
          <div>
            <h2 class="garamond text-5xl font-serif font-semibold">
              Elementum
            </h2>
          </div>
          <div>
            <div class="flex hidden md:inline-flex gap-5 didot font-semibold">
              <h4>Home</h4>
              <h4>Studio</h4>
              <h4>Services</h4>
              <h4>Contact</h4>
              <h4>FAQs</h4>
            </div>
            <div>
              <!-- Sidebar -->
              <div>
                <div class="drawer inline-block md:hidden">
                  <input
                    id="my-drawer-2"
                    type="checkbox"
                    class="drawer-toggle"
                  />
                  <div class="drawer-content flex flex-col">
                    <!-- Navbar -->
                    <div class="w-full">
                      <div class="flex-none">
                        <label
                          for="my-drawer-2"
                          aria-label="open sidebar"
                          class="btn"
                        >
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            class="inline-block h-6 w-6 stroke-current"
                          >
                            <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2"
                              d="M4 6h16M4 12h16M4 18h16"
                            ></path>
                          </svg>
                        </label>
                      </div>
                    </div>
                  </div>
                  <div class="drawer-side">
                    <label
                      for="my-drawer-2"
                      aria-label="close sidebar"
                      class="drawer-overlay"
                    ></label>
                    <ul
                      class="menu font-bold bg-gray-600 min-h-full w-50 p-5 didot gap-3 rounded-r-xl"
                    >
                      <!-- Sidebar content here -->
                      <li><a class="btn rounded-full">Home</a></li>
                      <li><a class="btn rounded-full">Studio</a></li>
                      <li><a class="btn rounded-full">Services</a></li>
                      <li><a class="btn rounded-full">Contact</a></li>
                      <li><a class="btn rounded-full">FAQs</a></li>
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>
  </body>
</html>
